        /*  TEMA HIJAU GELAP + GLOW + GLASSMORPHISM                      */
        /* ============================================================ */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            background: radial-gradient(ellipse at 20% 20%, #0d2a1a, #05180e 70%);
            min-height: 100vh;
            padding: 20px;
            color: #d4e8d4;
        }

        @keyframes glowPulse {
            0%,
            100% {
                box-shadow: 0 0 20px rgba(34, 197, 94, 0.02);
            }
            50% {
                box-shadow: 0 0 50px rgba(34, 197, 94, 0.07);
            }
        }

            max-width: 1440px;
            margin: 0 auto;
            background: rgba(8, 25, 15, 0.6);
            backdrop-filter: blur(18px) saturate(180%);

            border-radius: 44px;
            padding: 28px 32px 36px;
            border: 1px solid rgba(34, 197, 94, 0.10);
            box-shadow: 0 20px 60px rgba(0, 10, 5, 0.6), 0 0 60px rgba(34, 197, 94, 0.03);
            animation: glowPulse 8s ease-in-out infinite;
        }

        /* ===== HEADER ===== */
        .brand {
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            justify-content: space-between;
            gap: 16px 24px;
            padding-bottom: 16px;
            border-bottom: 1px solid rgba(34, 197, 94, 0.12);
            margin-bottom: 24px;
        }

        .brand-left {
            display: flex;
            align-items: center;
            gap: 14px;
        }

        .brand-left .logo-icon {
            width: 48px;
            height: 48px;
            background: radial-gradient(circle at 30% 30%, #2a9d5a, #0a3a1e);
            border-radius: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            color: #ccffd8;
            box-shadow: 0 0 30px rgba(34, 197, 94, 0.20);
            flex-shrink: 0;
        }

        .brand-text h1 {
            font-size: 22px;
            font-weight: 700;
            color: #c6f0d6;
            letter-spacing: -0.3px;
            line-height: 1.2;
            text-shadow: 0 0 30px rgba(34, 197, 94, 0.06);
        }
        .brand-text h1 small {
            font-weight: 400;
            font-size: 15px;
            color: #8bc9a8;
            margin-left: 6px;
        }
        .brand-text .sub {
            font-size: 13px;
            color: #88c0a0;
            opacity: 0.85;
            margin-top: 2px;
        }

        .dashboard-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 20px;
            margin-top: 10px;
        }

        /* ===== MAIN CARD ===== */
        .main-card {
            background: rgba(8, 25, 15, 0.35);
            backdrop-filter: blur(8px);
            border-radius: 28px;
            border: 1px solid rgba(34, 197, 94, 0.08);
            box-shadow: 0 8px 30px rgba(0, 8, 4, 0.3);
            overflow: hidden;
            transition: 0.2s;
            display: flex;
            flex-direction: column;
        }

        .main-card:hover {
            border-color: rgba(34, 197, 94, 0.2);
            box-shadow: 0 8px 40px rgba(34, 197, 94, 0.05);
        }

        .main-card-header {
            padding: 16px 20px 10px 20px;
            border-bottom: 1px solid rgba(34, 197, 94, 0.06);
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .main-card-header .icon {
            font-size: 28px;
            line-height: 1;
        }

        .main-card-header .title-group {
            flex: 1;
        }

        .main-card-header .title-group h2 {
            font-size: 18px;
            font-weight: 700;
            color: #d4f0de;
            line-height: 1.2;
        }

        .main-card-header .title-group .subtitle {
            font-size: 12px;
            color: #8bc9a8;
            opacity: 0.8;
            margin-top: 2px;
        }

        .main-card-body {
            padding: 12px 16px 16px 16px;
            display: flex;
            flex-direction: column;
            gap: 10px;
            flex: 1;
        }

        /* ===== SUB-CARD ===== */
        .sub-card {
            background: rgba(255, 255, 255, 0.04);
            border-radius: 16px;
            padding: 12px 16px;
            border: 1px solid rgba(34, 197, 94, 0.06);
            transition: 0.15s;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 10px;
        }

        .sub-card:hover {
            background: rgba(34, 197, 94, 0.05);
            border-color: rgba(34, 197, 94, 0.15);
            transform: translateX(4px);
            box-shadow: 0 0 20px rgba(34, 197, 94, 0.02);
        }

        .sub-card .info {
            display: flex;
            flex-direction: column;
            gap: 2px;
        }

        .sub-card .info .label {
            font-size: 14px;
            font-weight: 500;
            color: #c6f0d6;
        }

        .sub-card .info .desc {
            font-size: 12px;
            color: #8bc9a8;
            opacity: 0.7;
        }

        .sub-card .badge {
            background: rgba(34, 197, 94, 0.12);
            border-radius: 30px;
            padding: 2px 12px;
            font-size: 11px;
            font-weight: 600;
            color: #b8e0c8;
            white-space: nowrap;
        }

        .sub-card .arrow {
            font-size: 14px;
            color: #6a9a7a;
            opacity: 0.4;
            transition: 0.2s;
        }

        .sub-card:hover .arrow {
            opacity: 0.8;
            transform: translateX(4px);
        }

        /* ===== MODAL ===== */
        .modal-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(10px);
            z-index: 1000;
            padding: 20px;
            justify-content: center;
            align-items: center;
        }
        .modal-overlay.active {
            display: flex;
        }

        .modal-card {
            background: rgba(8, 25, 15, 0.9);
            backdrop-filter: blur(18px);
            border-radius: 32px;
            max-width: 1000px;
            width: 100%;
            max-height: 90vh;
            overflow-y: auto;
            padding: 28px 32px 32px;
            border: 1px solid rgba(34, 197, 94, 0.12);
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.6), 0 0 80px rgba(34, 197, 94, 0.04);
            animation: modalFade 0.25s ease-out;
            position: relative;
        }

        @keyframes modalFade {
            from {
                opacity: 0;
                transform: scale(0.96) translateY(20px);
            }
            to {
                opacity: 1;
                transform: scale(1) translateY(0);
            }
        }

            position: sticky;
            top: 0;
            float: right;
            background: rgba(255, 255, 255, 0.06);
            border: none;
            color: #b8e0c8;
            font-size: 22px;
            cursor: pointer;
            width: 40px;
            height: 40px;
            border-radius: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: 0.15s;
            z-index: 10;
        }
        .modal-close:hover {
            background: rgba(255, 255, 255, 0.1);
            color: #eaffef;
        }

        .modal-title {
            font-size: 22px;
            font-weight: 700;
            color: #d4f0de;
            margin-bottom: 8px;
        }
        .modal-subtitle {
            font-size: 14px;
            color: #8bc9a8;
            margin-bottom: 16px;
        }

        .modal-body .table-wrap {
            overflow-x: auto;
            border-radius: 16px;
            background: rgba(8, 25, 15, 0.3);
            border: 1px solid rgba(34, 197, 94, 0.06);
            margin: 12px 0 16px;
        }
        .modal-body table {
            width: 100%;
            border-collapse: collapse;
            font-size: 13px;
            min-width: 500px;
        }
        .modal-body th {
            background: rgba(34, 197, 94, 0.07);
            color: #c6f0d6;
            font-weight: 600;
            padding: 10px 12px;
            text-align: left;
            border-bottom: 1px solid rgba(34, 197, 94, 0.10);
        }
        .modal-body td {
            padding: 8px 12px;
            border-bottom: 1px solid rgba(34, 197, 94, 0.04);
            color: #d0e8d8;
        }
        .modal-body tr:hover td {
            background: rgba(34, 197, 94, 0.02);
        }

        .modal-body .narrative {
            background: rgba(34, 197, 94, 0.04);
            border-left: 4px solid rgba(34, 197, 94, 0.25);
            border-radius: 12px;
            padding: 14px 20px;
            margin: 12px 0 8px;
            line-height: 1.7;
            color: #c0e0d0;
        }

            color: #d4f0de;

            flex-wrap: wrap;
            gap: 12px 24px;

            border-radius: 14px;
            padding: 10px 18px;
            border: 1px solid rgba(34, 197, 94, 0.06);
            margin: 8px 0 14px;
            font-size: 14px;
            color: #b8e0c8;
        }
        .modal-body .stat-box span {

            color: #d4f0de;
        }

            background: rgba(8, 25, 15, 0.25);
            border-radius: 14px;
            padding: 16px;
            border: 1px solid rgba(34, 197, 94, 0.06);
        }

            width: 100% !important;
            height: auto !important;
            max-height: 200px;
        }

            text-align: center;
            font-size: 13px;
            color: #6a9a7a;
            opacity: 0.7;
            border-top: 1px solid rgba(34, 197, 94, 0.06);
            padding-top: 20px;
            margin-top: 30px;

            .dashboard-grid {

                margin: 10px;
            }
        }
        @media (max-width: 480px) {
            body {
                padding: 10px;
            }
            .brand-text h1 {
                font-size: 18px;
            }
            .brand-text h1 small {
                font-size: 12px;
                display: block;
                margin-left: 0;
            }
        }
    </style>
</head>

        // ================================================================

        let chartInstances = {};

        function openModal(id) {
            const overlay = document.getElementById('modalOverlay');
            const content = document.getElementById('modalContent');

            let detail = detailData[id];
            if (!detail) {
                detail = getFallbackDetail(id);
            }

            // Build table
            let tableHtml = '';
            if (detail.headers && detail.rows) {
                tableHtml = `
                            <div class="table-wrap">
                                <table>
                                    <thead>
                                        <tr>${detail.headers.map(h => `<th>${h}</th>`).join('')}</tr>
                                    </thead>
                                    <tbody>
                                        ${detail.rows.map(row => `<tr>${row.map(c => `<td>${c}</td>`).join('')}</tr>`).join('')}
                                    </tbody>
                                </table>
                            </div>
                        `;
            }

            let statHtml = detail.stat ? `
                        <div class="stat-box">
                            <span>📊 ${detail.stat}</span>
                        </div>
                    ` : '';

            let narrativeHtml = detail.narrative ? `
                        <div class="narrative">
                            <strong>📝 Analisis & Interpretasi</strong><br>
                            ${detail.narrative}
                        </div>
                    ` : '';

            let chartHtml = '';
            if (detail.chart) {
                chartHtml = `
                            <div class="chart-container">
                                <canvas id="modalChart"></canvas>
                            </div>
                        `;
            }

            content.innerHTML = `
                        <div class="modal-title">${detail.title}</div>
                        <div class="modal-subtitle">${detail.subtitle}</div>
                        ${statHtml}
                        ${tableHtml}
                        ${chartHtml}
                        ${narrativeHtml}
                    `;

            overlay.classList.add('active');
            document.body.style.overflow = 'hidden';

            if (detail.chart) {
                setTimeout(() => initModalChart(detail.chart), 100);
            }
        }

        // ================================================================
        //  CHART IN MODAL
        // ================================================================

        function initModalChart(chartType) {
            const canvas = document.getElementById('modalChart');
            if (!canvas) return;

            if (chartInstances.modal) {
                chartInstances.modal.destroy();
                delete chartInstances.modal;
            }

            let data, labels, label, colors;

            switch (chartType) {
                case 'sks_per_semester':
                    labels = ['Sem 1', 'Sem 2', 'Sem 3', 'Sem 4', 'Sem 5', 'Sem 6', 'Sem 7', 'Sem 8'];
                    data = [20, 19, 20, 21, 20, 20, 18, 6];
                    label = 'SKS';
                    colors = data.map(v => v >= 20 ? 'rgba(34, 197, 94, 0.7)' : 'rgba(251, 191, 36, 0.7)');
                    break;
                case 'prestasi_tingkat':
                    labels = ['Internasional', 'Nasional', 'Lokal'];
                    data = [4, 5, 2];
                    label = 'Jumlah Prestasi';
                    colors = ['rgba(34, 197, 94, 0.7)', 'rgba(251, 191, 36, 0.7)', 'rgba(96, 165, 250, 0.7)'];
                    break;
                case 'beasiswa_distribusi':
                    labels = ['KIP Kuliah', 'Prestasi', 'PPA', 'Bantuan UKT', 'Unggulan'];
                    data = [45, 10, 15, 30, 5];
                    label = 'Jumlah Penerima';
                    colors = ['rgba(34, 197, 94, 0.7)', 'rgba(52, 211, 153, 0.7)', 'rgba(96, 165, 250, 0.7)',
                        'rgba(251, 191, 36, 0.7)', 'rgba(244, 63, 94, 0.7)'
                    ];
                    break;
                case 'kepuasan_pengguna':
                    labels = ['Etika', 'Kompetensi', 'Komunikasi', 'Kerjasama', 'Kreativitas', 'Teknologi'];
                    data = [87, 85, 90, 88, 84, 86];
                    label = 'Skor (%)';
                    colors = data.map(v => v >= 85 ? 'rgba(34, 197, 94, 0.7)' : 'rgba(251, 191, 36, 0.7)');
                    break;
                default:
                    return;
            }

            const ctx = canvas.getContext('2d');
            chartInstances.modal = new Chart(ctx, {
                type: 'bar',
                data: {
                    labels: labels,
                    datasets: [{
                        label: label || 'Nilai',
                        data: data,
                        backgroundColor: colors || 'rgba(34, 197, 94, 0.6)',
                        borderColor: 'rgba(34, 197, 94, 0.8)',
                        borderWidth: 1.5,
                        borderRadius: 6,
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: true,
                    plugins: {
                        legend: { display: false },
                        tooltip: {
                            callbacks: {
                                label: ctx => `${ctx.parsed.y} ${label ? '' : ''}`
                            }
                        }
                    },
                    scales: {
                        y: {
                            beginAtZero: true,
                            grid: { color: 'rgba(34, 197, 94, 0.08)' },
                            ticks: { color: '#88c0a0' }
                        },
                        x: {
                            grid: { display: false },
                            ticks: { color: '#88c0a0' }
                        }
                    }
                }
            });
        }

        // ================================================================

        function closeModal() {
            const overlay = document.getElementById('modalOverlay');
            overlay.classList.remove('active');
            document.body.style.overflow = '';
            if (chartInstances.modal) {
                chartInstances.modal.destroy();
                delete chartInstances.modal;
            }
        }

        document.getElementById('modalClose').addEventListener('click', closeModal);
        document.getElementById('modalOverlay').addEventListener('click', function(e) {
            if (e.target === this) closeModal();
        });
        document.addEventListener('keydown', function(e) {
            if (e.key === 'Escape') closeModal();
        });

        // ================================================================
        //  INIT
        // ================================================================

        document.addEventListener('DOMContentLoaded', renderDashboard);
    </script>

</body>
</html>
